<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoredCheese | Higher or Lower</title>
    <style>
        body { font-family: 'Arial Black', sans-serif; background: #000; color: white; margin: 0; display: flex; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        #name-screen, #leaderboard-screen, #game-over { position: fixed; inset: 0; background: #d4a017; z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #000; }
        #game-ui { display: none; width: 100%; height: 100%; flex-direction: row; }
        #leaderboard-screen, #game-over { display: none; }
        .side { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; }
        .left { background: #d4a017; color: #000; }
        .right { background: #1a1a1a; color: #fff; }
        input { padding: 15px; font-size: 1.5rem; border: 4px solid #000; margin: 10px; text-align: center; }
        button { background: #fff; border: 4px solid #000; color: #000; padding: 12px 30px; font-size: 1.2rem; cursor: pointer; font-weight: bold; box-shadow: 5px 5px 0px #000; margin: 10px; }
        button:active { transform: translate(2px, 2px); box-shadow: none; }
        .stat { font-size: 3.5rem; font-weight: bold; }
        .score-box { position: absolute; top: 20px; background: #fff; color: #000; padding: 10px 20px; border: 3px solid #000; font-weight: bold; z-index: 100; display: none; }
        .lb-list { width: 300px; background: white; border: 4px solid black; padding: 20px; }
    </style>
</head>
<body>

    <div id="name-screen">
        <h1 style="font-size: 3rem;">BORED CHEESE</h1>
        <input type="text" id="p-name" placeholder="Name..." maxlength="12">
        <div>
            <button onclick="startGame()">PLAY GAME</button>
            <button onclick="showLB()" style="background: #000; color: #fff;">TOP 10</button>
        </div>
    </div>

    <div id="leaderboard-screen">
        <h1>TOP 10</h1>
        <div class="lb-list" id="lb-content"></div>
        <button onclick="document.getElementById('leaderboard-screen').style.display='none'">BACK</button>
    </div>

    <div class="score-box" id="sb">SCORE: <span id="score">0</span></div>

    <div id="game-ui">
        <div class="side left">
            <p>SEARCHES FOR</p>
            <h2 id="l-name">---</h2>
            <div class="stat" id="l-val">0</div>
        </div>
        <div class="side right">
            <p>DOES</p>
            <h2 id="r-name">---</h2>
            <button onclick="check('h')">HIGHER</button>
            <button onclick="check('l')" style="background: #444; color: #fff;">LOWER</button>
            <p>THAN <span id="vs">---</span>?</p>
        </div>
    </div>

    <div id="game-over">
        <h1 style="font-size: 4rem;">WRONG!</h1>
        <h2 id="final-msg">Score: 0</h2>
        <button onclick="location.reload()">RETRY</button>
    </div>
