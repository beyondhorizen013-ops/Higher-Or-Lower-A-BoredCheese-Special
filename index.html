        #name-screen { position: fixed; inset: 0; background: #d4a017; z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; color: #000; }
        #game-ui { display: none; width: 100%; height: 100%; flex-direction: row; }

        h2 { font-size: 3rem; margin: 10px 0; text-transform: uppercase; }

        .score-box { position: absolute; top: 20px; background: #fff; color: #000; padding: 10px 20px; border: 3px solid #000; font-weight: bold; z-index: 100; }
        
        #game-over { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; flex-direction: column; align-items: center; justify-content: center; }
    </style>
</head>
