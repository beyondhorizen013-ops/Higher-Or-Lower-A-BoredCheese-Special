<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BoredCheese | Higher or Lower</title>
    <style>
        body { font-family: 'Arial Black', sans-serif; background: #000; color: white; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* Name Input Screen */
        #name-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #d4a017; z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; color: black; }
        #player-name { padding: 15px; font-size: 1.5rem; border: 4px solid black; margin-bottom: 20px; text-align: center; font-family: inherit; width: 250px; }

        /* Game Layout */
        .game-container { display: none; width: 100%; height: 100%; }
        .side { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; transition: 0.5s; position: relative; }
        .left { background: #d4a017; color: black; border-right: 2px solid #000; }
        .right { background: #1a1a1a; }
        
        h2 { font-size: 3.5rem; margin: 10px 0; text-transform: uppercase; line-height: 1; }
        .score-hud { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); background: white; color: black; padding: 10px 25px; border: 4px solid black; font-size: 1.2rem; z-index: 10; font-weight: bold; display: none; }
        
        .btn-container { margin: 20px 0; }
        button { background: #fff; border: 4px solid #000; color: #000; padding: 15px 40px; font-size: 1.5rem; cursor: pointer; margin: 10px; font-family: inherit; transition: 0.1s; font-weight: bold; box-shadow: 5px 5px 0px #d4a017; }
        button:hover { transform: translate(-2px, -2px); box-shadow: 7px 7px 0px #000; }
        button:active { transform: translate(2px, 2px); box-shadow: 0px 0px 0px #000; }
        .stat { font-size: 3rem; font-weight: bold; margin: 10px 0; }

        /* Game Over */
        #game-over { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .leaderboard { margin: 20px 0; background: #222; padding: 20px; border: 4px solid #d4a017; min-width: 320px; color: white; }
        .leaderboard-item { display: flex; justify-content: space-between; border-bottom: 1px dashed #d4a017; padding: 10px 0; font-size: 1.2rem; }
    </style>
</head>
<body>

    <div id="name-screen">
        <h1 style="font-size: 3rem;">BORED CHEESE</h1>
        <p>ENTER PLAYER NAME</p>
        <input type="text" id="player-name" placeholder="Name..." maxlength="12">
        <button onclick="startGame()" style="box-shadow: 5px 5px 0px #fff;">PLAY NOW</button>
    </div>

    <div class="score-hud" id="hud">
        <span id="hud-name">PLAYER</span>: <span id="current-score">0</span>
    </div>

    <div class="game-container" id="main-game">
        <div class="side left">
            <p>SEARCH VOLUME FOR</p>
            <h2 id="left-name">---</h2>
            <div class="stat" id="left-val">0</div>
            <p>PER MONTH</p>
        </div>

        <div class="side right">
            <p>DOES</p>
            <h2 id="right-name">---</h2>
            <div class="btn-container">
                <button onclick="checkAnswer('higher')">▲ HIGHER</button>
                <button onclick="checkAnswer('lower')">▼ LOWER</button>
            </div>
            <p>HAVE MORE SEARCHES THAN <span id="vs-name">---</span>?</p>
        </div>
    </div>

    <div id="game-over">
        <h1 style="color: #d4a017; font-size: 4rem;">WRONG!</h1>
        <div class="leaderboard">
            <h3 style="margin-top:0;">🧀 LOCAL TOP SCORES</h3>
            <div id="leaderboard-list"></div>
        </div>
        <button onclick="location.reload()">TRY AGAIN</button>
    </div>

    <script>
        const data = [
            { name: "Cheddar", value: 5000000 },
            { name: "Mozzarella", value: 8200000 },
            { name: "Sambucha", value: 4100000 },
            { name: "JackSucksAtLife", value: 2500000 },
            { name: "MrBeast", value: 95000000 },
            { name: "Swiss Cheese", value: 1200000 },
            { name: "Brie", value: 3400000 },
            { name: "Parmesan", value: 6800000 },
            { name: "Gouda", value: 2900000 },
            { name: "Minecraft", value: 120000000 },
            { name: "Roblox", value: 90000000 },
            { name: "Cheese Strings", value: 450000 }
        ];

        let score = 0;
        let playerName = "Player";
        let leftItem, rightItem;

        function startGame() {
            const input = document.getElementById('player-name').value;
            if (input.trim() !== "") playerName = input;
            
            document.getElementById('hud-name').innerText = playerName.toUpperCase();
            document.getElementById('name-screen').style.display = 'none';
            document.getElementById('main-game').style.display = 'flex';
            document.getElementById('hud').style.display = 'block';
            
            setupInitialItems();
        }

        function setupInitialItems() {
            leftItem = data[Math.floor(Math.random() * data.length)];
            pickNewRightItem();
            updateUI();
        }

        function pickNewRightItem() {
            do {
                rightItem = data[Math.floor(Math.random() * data.length)];
            } while (rightItem.name === leftItem.name);
        }

        function updateUI() {
            document.getElementById('left-name').innerText = leftItem.name;
            document.getElementById('left-val').innerText = leftItem.value.toLocaleString();
            document.getElementById('right-name').innerText = rightItem.name;
            document.getElementById('vs-name').innerText = leftItem.name.toUpperCase();
        }

        function checkAnswer(guess) {
            const isHigher = rightItem.value >= leftItem.value;
            const won = (guess === 'higher' && isHigher) || (guess === 'lower' && !isHigher);

            if (won) {
                score++;
                document.getElementById('current-score').innerText = score;
                leftItem = rightItem;
                pickNewRightItem();
                updateUI();
            } else {
                endGame();
            }
        }

        function endGame() {
            document.getElementById('main-game').style.display = 'none';
            document.getElementById('hud').style.display = 'none';
            document.getElementById('game-over').style.display = 'flex';
            
            saveScore(playerName, score);
            displayLeaderboard();
        }

        function saveScore(name, score) {
            let scores = JSON.parse(localStorage.getItem('cheeseScores')) || [];
            scores.push({ name, score });
            scores.sort((a, b) => b.score - a.score);
            scores = scores.slice(0, 5); 
            localStorage.setItem('cheeseScores', JSON.stringify(scores));
        }

        function displayLeaderboard() {
            const list = document.getElementById('leaderboard-list');
            const scores = JSON.parse(localStorage.getItem('cheeseScores')) || [];
            list.innerHTML = scores.map(s => `
                <div class="leaderboard-item">
                    <span>${s.name}</span>
                    <span>${s.score}</span>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
