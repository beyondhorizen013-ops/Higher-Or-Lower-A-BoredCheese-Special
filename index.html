        body { font-family: 'Arial Black', sans-serif; background: #000; color: white; margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; overflow: hidden; }
        
        /* Name Input Screen */
        #name-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #d4a017; z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center; color: black; }

        .side { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 20px; text-align: center; transition: 0.5s; position: relative; }

        .right { background: #222; }

        button { background: transparent; border: 3px solid white; color: white; padding: 15px 30px; font-size: 1.2rem; cursor: pointer; margin: 5px; font-family: inherit; transition: 0.2s; font-weight: bold; }
        button:hover { background: white; color: black; }
        .stat { font-size: 2.5rem; font-weight: bold; }

        /* Game Over & Leaderboard */
        #game-over { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .leaderboard { margin: 20px 0; background: #333; padding: 20px; border: 2px solid #d4a017; min-width: 300px; }
        .leaderboard-item { display: flex; justify-content: space-between; border-bottom: 1px dashed #555; padding: 5px 0; }
    </style>
</head>
